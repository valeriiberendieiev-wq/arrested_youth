<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Räapha — Promo Proposition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#fafaf7; --card:#ffffff; --border:#e5e3dc;
  --text:#1f1f1f; --text2:#5a5a5a; --text3:#9a9a9a;
  --accent:#dc2626; --accent2:#eab308;
  --font:'Space Grotesk',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;
  background-image:radial-gradient(circle at 50% 0%,rgba(220,38,38,0.05),transparent 55%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 20px;}
.wrap{width:100%;max-width:600px;text-align:center;}

.kicker{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--accent);margin-bottom:32px;}

.photo-wrap{position:relative;width:188px;height:188px;margin:0 auto 26px;}
.photo-wrap::before{content:"";position:absolute;inset:-7px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:.9;}
.photo{position:relative;width:100%;height:100%;border-radius:50%;object-fit:cover;
  border:4px solid var(--card);display:block;}
.photo-cap{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:10px;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);
  border:1px solid var(--border);border-radius:20px;padding:5px 14px;background:var(--card);}

h1{font-size:clamp(38px,8vw,60px);font-weight:700;letter-spacing:-2px;line-height:1.05;
  margin-top:24px;
  background:linear-gradient(135deg,var(--text) 35%,var(--accent));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{font-size:17px;font-weight:500;color:var(--text2);letter-spacing:1px;margin-top:6px;}

.divider{width:54px;height:3px;border-radius:2px;margin:34px auto 30px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));}

.menu{display:flex;flex-direction:column;gap:14px;text-align:left;}
.btn{display:flex;align-items:center;gap:18px;text-decoration:none;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px 22px;color:var(--text);transition:all .22s ease;position:relative;overflow:hidden;}
.btn::after{content:"\2192";position:absolute;right:22px;font-size:20px;color:var(--text3);
  transition:all .22s ease;}
.btn:hover{border-color:rgba(220,38,38,.45);transform:translateY(-3px);
  box-shadow:0 12px 28px -12px rgba(220,38,38,.35);}
.btn:hover::after{color:var(--accent);transform:translateX(4px);}
.btn-num{flex:0 0 42px;height:42px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-weight:600;font-size:15px;
  background:rgba(220,38,38,.08);color:var(--accent);}
.btn-txt{flex:1;padding-right:24px;}
.btn-title{font-size:16px;font-weight:600;letter-spacing:-.3px;line-height:1.3;}
.btn-desc{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text3);margin-top:3px;}

.foot{margin-top:36px;font-family:var(--mono);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);}

@media(max-width:480px){
  .btn{padding:16px 18px;gap:14px}
  .btn::after{right:18px}
  .btn-num{flex-basis:38px;height:38px}
}
</style>
</head>
